workflows:
  flutter-health-ai:
    name: HealthAI Monitor Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          echo "📁 Location: $(pwd)"
          ls -la
          flutter pub get

      - name: Patch tflite_flutter
        script: |
          TFLITE_PATH="$HOME/.pub-cache/hosted/pub.dev"
          TFLITE_DIR=$(ls $TFLITE_PATH | grep tflite_flutter | head -1)
          TENSOR_FILE="$TFLITE_PATH/$TFLITE_DIR/lib/src/tensor.dart"
          echo "Looking for: $TENSOR_FILE"
          if [ -f "$TENSOR_FILE" ]; then
            if grep -q "UnmodifiableUint8ListView" "$TENSOR_FILE"; then
              sed -i '' 's/UnmodifiableUint8ListView(/Uint8List.fromList(/g' "$TENSOR_FILE"
              echo "✅ Patched!"
            else
              echo "✅ No patch needed"
            fi
          else
            echo "⚠️ File not found"
          fi

      - name: Build Android APK
        script: |
          flutter build apk --release
          echo "✅ Android APK built"

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
          echo "✅ iOS built"

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/iphoneos/Runner.app
      - "**/*.ipa"